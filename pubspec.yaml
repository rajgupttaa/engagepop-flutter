name: engagepop
description: EngagePop Flutter SDK — native push notifications and in-app messages.
version: 0.1.0
homepage: https://engagepop.com
repository: https://github.com/rajgupttaa/engagepop-flutter

environment:
  sdk: ">=2.17.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.engagepop.flutter
        pluginClass: EngagepopPlugin
      ios:
        pluginClass: EngagepopPlugin
